<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宫阙云览·故宫可视化平台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>宫</text></svg>">
  <!-- 新增首页样式（必须在主样式之前加载，以覆盖CSS变量） -->
  <link rel="stylesheet" href="css/archive/home.css">
  <link rel="stylesheet" href="css/archive/nav.css">
  <link rel="stylesheet" href="css/archive/overview.css">
  <link rel="stylesheet" href="css/archive/info.css">
  <link rel="stylesheet" href="css/archive/timeline.css">
  <link rel="stylesheet" href="css/archive/building-detail.css">
  <!-- 原有样式 -->
  <link rel="stylesheet" href="css/style.css?v=20260411-jishou-8">
  <link rel="stylesheet" href="css/assistant-widget.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- ===== 首页主容器 ===== -->
  <div class="home-page" id="home-page">

    <!-- ========== 左侧导航 ========== -->
    <nav class="home-nav" id="home-nav">
      <!-- 宫阙载史 + 宫阙玄思（保留在按钮组内） -->
      <div class="home-nav__btns">
        <button class="home-nav__btn active" data-module="archive">
          <span class="home-nav__btn-zh">宫阙载史</span>
          <span class="home-nav__btn-en">Palace Archive</span>
        </button>
        <button class="home-nav__btn" data-module="thought">
          <span class="home-nav__btn-zh">宫阙玄思</span>
          <span class="home-nav__btn-en">Spatial Philosophy</span>
        </button>
      </div>

      <!-- 宫阙清赏（独立，绝对定位） -->
      <button class="home-nav__btn" data-module="appreciation">
        <span class="home-nav__btn-zh">宫阙清赏</span>
        <span class="home-nav__btn-en">Architectural Appreciation</span>
      </button>

      <!-- 宫阙形制（独立，绝对定位） -->
      <button class="home-nav__btn" data-module="typology">
        <span class="home-nav__btn-en">Architectural Typology</span>
        <span class="home-nav__btn-zh">宫阙形制</span>
      </button>

      <!-- 筑灵助手区域 -->
      <div class="home-nav__assistant">
        <button class="home-nav__assistant-btn" id="home-assistant-btn" title="筑灵助手"></button>
        <button class="home-nav__lang-btn" id="home-lang-btn">简/EN</button>
      </div>
    </nav>

    <!-- ========== 中间区域 ========== -->
    <section class="home-overview" id="home-overview">
      <!-- 宫阙载史：overview.svg -->
      <div class="home-overview__svg-container" id="home-svg-container">
        <!-- SVG将通过JS动态加载 -->
      </div>
      <!-- 其他模块占位（后续搭建） -->
      <div class="home-overview__placeholder" id="home-overview-placeholder" hidden>
        <span class="home-overview__placeholder-text">模块内容开发中</span>
      </div>
    </section>

    <!-- ========== 右侧信息面板 ========== -->
    <aside class="home-info" id="home-info">
      <div class="home-info__title">
        <h1>故宫</h1>
        <p class="home-info__subtitle">Forbidden City</p>
      </div>

      <div class="home-info__stats" id="home-stats"></div>

      <div class="home-info__intro" id="home-intro"></div>

      <div class="home-info__timeline-section" id="home-timeline-section">
        <h3 class="home-info__timeline-title">明清时间线</h3>
        <div id="home-timeline"></div>
      </div>
    </aside>

  </div>

  <!-- ===== 原有的多模块容器（保留用于后续开发） ===== -->
  <div id="app-shell" class="app-shell" hidden>
    <!-- 原有模块内容保持不变，后续由用户指导搭建 -->
  </div>

  <!-- ===== JS 依赖 ===== -->
  <script src="js/archive/data.js"></script>
  <script src="js/archive/svgScanner.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>

  <!-- 筑灵助手 -->
  <script src="js/assistant/assistant-speech.js"></script>
  <script src="js/assistant/assistant-api.js"></script>
  <script src="js/assistant/assistant-widget.js"></script>

  <!-- 首页脚本 -->
  <script src="js/archive/overview.js"></script>
  <script src="js/archive/timeline.js"></script>
  <script src="js/archive/building-detail.js"></script>
  <script src="js/archive/main.js"></script>

  <!-- 图片灯箱 -->
  <div id="image-lightbox" class="image-lightbox" hidden role="dialog" aria-modal="true" aria-label="图片放大">
    <div class="image-lightbox__backdrop" data-lightbox-close></div>
    <button type="button" class="image-lightbox__close" data-lightbox-close aria-label="关闭">×</button>
    <img id="lightbox-img" class="image-lightbox__img" alt="">
  </div>

  <div id="overview-tooltip" class="overview-tooltip" hidden></div>

  <!-- 视频灯箱 -->
  <div id="video-lightbox" class="image-lightbox video-lightbox" hidden role="dialog" aria-modal="true" aria-label="视频放大">
    <div class="image-lightbox__backdrop" data-video-lightbox-close></div>
    <button type="button" class="image-lightbox__close" data-video-lightbox-close aria-label="关闭">×</button>
    <div class="video-lightbox__panel">
      <video id="lightbox-video" class="video-lightbox__video" controls playsinline></video>
      <div id="lightbox-video-path" class="video-lightbox__path"></div>
    </div>
  </div>

  <!-- 初始化 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 初始化全局状态（必须在其他脚本之前）
      window.state = { lang: 'zh' }

      // 初始化首页
      if (typeof HomePage !== 'undefined') {
        window.homePage = new HomePage()
        window.homePage.init()
      }
    })
  </script>
</body>
</html>
